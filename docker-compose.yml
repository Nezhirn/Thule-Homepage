services:
  homepage:
    image: thuleseeker/thule:latest
    container_name: thule-homepage
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Сохраняем базу данных и загруженные файлы
      - homepage-data:/app/backend/uploads
      - homepage-data:/app/backend
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  homepage-data:
    driver: local
