services:
  homepage:
    image: thuleseeker/thule:latest
    container_name: thule-homepage
    ports:
      - "8000:8000"
    volumes:
      - thule-data:/app/backend
    environment:
      - TZ=Europe/Moscow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M

  # Опционально: reverse proxy с TLS
